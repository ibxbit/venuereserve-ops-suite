services:
  mysql:
    image: mysql:8.0
    container_name: studio-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: studio_local
      MYSQL_USER: studio_user
      MYSQL_PASSWORD: studio_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-proot_password",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: studio-backend
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: studio_user
      DB_PASSWORD: studio_password
      DB_NAME: studio_local
      DB_WAIT_RETRIES: 60
      DB_WAIT_DELAY_MS: 2000
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: studio-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api/v1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  mysql-data:
